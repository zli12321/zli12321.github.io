<div class="my-3 p-0 bg-white shadow-sm rounded-xl" id="open-source">
    <h6 class="border-bottom border-gray p-3 mb-0">
        <i class="fas fa-code-branch"></i> Open Source Projects
    </h6>
    <div class="p-3">
        <div class="row">
            {% for project in site.data.projects %}
            <div class="col-12 col-md-6 mb-3">
                <div class="card h-100 border shadow-sm" style="border-radius: 10px;">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-start justify-content-between mb-1">
                            <a href="https://github.com/{{ project.github }}" target="_blank" class="font-weight-bold text-dark" style="font-size: 0.95rem; line-height: 1.3;">
                                <i class="fab fa-github mr-1"></i>{{ project.name }}
                            </a>
                            <span class="badge badge-pill badge-secondary ml-2 text-nowrap" style="font-size: 0.8rem;" data-github-repo="{{ project.github }}">
                                <i class="fas fa-star"></i> —
                            </span>
                        </div>
                        <p class="text-muted mb-2" style="font-size: 0.85rem;">{{ project.description }}</p>
                        <div>
                            {% if project.paper_url %}
                            <a href="{{ project.paper_url }}" target="_blank" class="badge badge-pill badge-publication badge-success mr-1">{{ project.paper_label }}</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
<script src="{{ '/assets/js/github_stars.js' | relative_url }}"></script>
